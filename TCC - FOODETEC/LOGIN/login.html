<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">

<body>

    <div class="wrapper">

        <div class="img-box"> 
            <img src="foto/teste.png" alt="icon">
        </div>

            <div class="wrapper">

              <div class="form-box-login">
        <form action="">
            <h1> Login </h1>
            <div class="input-box"> 
                <input type="text" placeholder=" Nome de usuário" required> 
                <i class='bx bx-user'></i>
            </div>

            <div class="input-box"> 
                <input type="password" placeholder= "Digite sua senha" required> 
                <i class='bx bx-lock'></i>
            </div>

            <div class="remember-forgot">
                <label> <input type="checkbox"> Lembrar minha senha </label>  
                <a href="#" > Esqueceu sua senha? </a> </div>
            <div> <button type="submit" class="botao"> Login </button> </div>
           
            <div class="registrar">
                <p>Não possui uma conta? <a href="../REGISTRO/index.html"> Registrar </a> </p> 
            </div>

            <div class="voltar">
            <p> Deseja voltar? <a href="../INICIO/index.html">  Clique aqui </a></p>    
            </div>
         </form> 
             </div> 

            
    

        </div>
