<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digite seu email</title>
  <link rel="stylesheet" href="../recuperacao-senha/style2.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
  
  <div class="wrapper"> 
    
        <div class="img-box"> 
            <img src="foto/teste.png" alt="icon">
        </div>
         
        
      <a href="../LOGIN/login.html"> 
      <i  class='bx bx-log-out btn-voltar' onclick="window.history.back()"></i>
    </a>

    <h2> Digite seu email </h2>
    <br>

    <div class="input-box">
    <input  type="email" id="email" placeholder="Digite seu email">
      <i class='bx bx-envelope'></i>
       </div>


  <div class="botao"> 
  <button onclick="enviar()">Enviar</button>
  </div>

  </div>

</body>


<script>
async function enviar() {
  const email = document.getElementById("email").value.trim();
 console.log("EMAIL ENVIADO:", email); 

  if (!email) {
    alert("Digite um email!");
    return;
  }

  const res = await fetch("http://127.0.0.1:5000/forgot-password", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email })
  });

  const texto = await res.text();
  alert(texto);
}
</script>
</html>
