  <!DOCTYPE html>
  <html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <title>Nova senha</title>
  <link rel="stylesheet" href="../recuperacao-senha/style1.css">
   <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  </head>
  
  <body>
    
    
       

    <div class="wrapper"> 
         <div class="img-box"> 
            <img src="foto/teste.png" alt="icon">
        </div>

      <a href="../LOGIN/login.html"> 
      <i  class='bx bx-log-out btn-voltar' onclick="window.history.back()"></i>
    </a>
    <h2>Definir nova senha</h2>

     <div class="input-box"> <input type="password" id="senha" placeholder="Nova senha">
      <i class='bx bx-low-vision'></i>
    <br><br>
    </div>

   <div class="input-box">  <input type="password" id="confirmasenha" placeholder="Confirme a senha">
    <i class='bx bx-low-vision'></i>
    <br><br>
    </div>

  <div class="botao"><button onclick="resetar()">Confirmar </button>
  </div>
    
      </div>
    <script>
      async function resetar() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        const senha = document.getElementById("senha").value;
        const confirmasenha = document.getElementById("confirmasenha").value;

        if (!token) {
          alert("Token inválido!");
          return;
        }

        if (!senha || !confirmasenha) {
          alert("Preencha todos os campos!");
          return;
        }

        if (senha !== confirmasenha) {
          alert("As senhas não coincidem!");
          return;
        }

        try {
          const res = await fetch("http://localhost:5000/reset-password", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ token, novaSenha: senha })
          });

          const texto = await res.text();
          alert(texto);

          // redireciona pro login depois
          window.location.href = "login.html";

        } catch (erro) {
          alert("Erro ao conectar com o servidor");
          console.log(erro);
        }
      }
    </script>

  </body>
  </html>
