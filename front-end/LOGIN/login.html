<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Aba de Login  </title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="wrapper">

        <div class="img-box"> 
            <img src="foto/teste.png" alt="icon">
        </div>

            <div class="wrapper">
                
      <a href="../INICIO/index.html"> 
      <i  class='bx bx-log-out btn-voltar' onclick="window.history.back()"></i>
    </a>

    
              <div class="form-box-login">

                
            <form id="LoginUsuarios">
    <h1> Login </h1>


    <div class="tipo-conta">
        <label>
            <input type="radio" name="userType" value="cliente" checked onclick="alternarFormulario()"> 
            Sou Cliente
        </label>
        <label>
            <input type="radio" name="userType" value="admin" onclick="alternarFormulario()"> 
            Sou Administrador
        </label>
    </div>

    <div id="campos-cliente"> 
    <div class="input-box"> 
        <input type="email" id="emailLogin" placeholder="Digite seu email" required> 
         <i class='bx bx-envelope'></i>
    </div>

    <div class="input-box"> 
        <input type="password" id="senhaLogin" placeholder="Digite sua senha" required> 
        <i class='bx bx-lock'></i>
    </div>
    </div>

    <div id="campos-admin" style="display: none;"> 
    <div class="input-box">
        <input type="text" placeholder="Código de Funcionário" required> 
        <i class='bx bx-id-card'></i>
    </div> <div class="input-box">
        <input type="password" placeholder="Digite sua senha " required>
        <i class='bx bx-lock'></i>
    </div> </div>


    <div class="remember-forgot">
        <label> <input type="checkbox"> Lembrar minha senha </label>  
        <a href="../recuperacao-senha/forgot-password.html"> Esqueceu sua senha? </a>
    </div>

    <button type="submit" class="botao"> Login </button>

      <div class="registrar">
            <p> Não possui uma conta? <a href="../REGISTRO/index.html"> Registrar </a></p>    
            </div>

            <div class="voltar">
            <p> Deseja voltar? <a href="../INICIO/index.html">  Clique aqui </a></p>    
            </div>
         </form>
             </div> 

            
    

        </div>

        
</body>
<script  src="/front-end/script.js" >
    
  
            
</script>
</html>
